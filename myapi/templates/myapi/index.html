<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doc ChatBot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --accent: #5b6af7;
      --accent-hover: #4a58e0;
      --text: #e2e4f0;
      --text-muted: #7b7f99;
      --danger: #e05252;
      --danger-hover: #c83d3d;
      --success: #3ecf8e;
      --user-bubble: #2c3170;
      --bot-bubble: #1e2133;
      --radius: 10px;
      --sidebar-w: 280px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOP BAR ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 12px;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
    }

    header h1 span { color: var(--accent); }

    .model-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .model-bar label {
      font-size: 0.8rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    select {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 0.85rem;
      cursor: pointer;
      outline: none;
    }

    select:focus { border-color: var(--accent); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background 0.15s, opacity 0.15s;
    }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 3px 8px; font-size: 0.75rem; }
    .btn-danger:hover:not(:disabled) { background: var(--danger); color: #fff; }
    .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
    .btn-ghost:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }

    /* ── LAYOUT ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    aside {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }

    .sidebar-section {
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-section h2 {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    /* drop zone */
    #drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 18px 10px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    #drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(91, 106, 247, 0.07);
    }

    #drop-zone p { font-size: 0.78rem; color: var(--text-muted); line-height: 1.5; }
    #drop-zone p strong { color: var(--accent); cursor: pointer; }

    #file-input { display: none; }

    .upload-progress {
      margin-top: 10px;
      font-size: 0.75rem;
      color: var(--text-muted);
      display: none;
    }

    .upload-progress.visible { display: flex; align-items: center; gap: 6px; }

    /* file list */
    .file-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 6px;
    }

    .file-list::-webkit-scrollbar { width: 5px; }
    .file-list::-webkit-scrollbar-track { background: transparent; }
    .file-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .file-group-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      padding: 8px 8px 4px;
    }

    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      border-radius: 6px;
      transition: background 0.15s;
      gap: 6px;
    }

    .file-item:hover { background: var(--surface2); }

    .file-icon { font-size: 1rem; flex-shrink: 0; }

    .file-name {
      font-size: 0.78rem;
      color: var(--text);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .empty-state {
      padding: 20px 10px;
      text-align: center;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    /* ── CHAT AREA ── */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .message {
      display: flex;
      gap: 10px;
      max-width: 78%;
    }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.bot  { align-self: flex-start; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      flex-shrink: 0;
      font-weight: 600;
    }

    .message.user .avatar { background: var(--accent); color: #fff; }
    .message.bot  .avatar { background: var(--surface2); color: var(--text-muted); }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 0.875rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: var(--user-bubble);
      color: var(--text);
      border-bottom-right-radius: 2px;
    }

    .message.bot .bubble {
      background: var(--bot-bubble);
      color: var(--text);
      border-bottom-left-radius: 2px;
      border: 1px solid var(--border);
    }

    .message.bot.error .bubble {
      background: rgba(224, 82, 82, 0.1);
      border-color: var(--danger);
      color: #f07575;
    }

    /* typing indicator */
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 12px 14px;
    }

    .typing-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%            { transform: translateY(-6px); opacity: 1; }
    }

    /* welcome */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    .welcome .icon { font-size: 3rem; }
    .welcome h2 { font-size: 1.2rem; color: var(--text); }
    .welcome p  { font-size: 0.875rem; max-width: 340px; line-height: 1.6; }

    /* ── INPUT BAR ── */
    .input-bar {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 10px 14px;
      font-size: 0.875rem;
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 140px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }

    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--text-muted); }

    #send-btn {
      height: 44px;
      width: 44px;
      padding: 0;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 0.83rem;
      font-weight: 500;
      z-index: 1000;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
    }

    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { background: var(--success); color: #0a2e1f; }
    #toast.error   { background: var(--danger);  color: #fff; }
    #toast.info    { background: var(--accent);  color: #fff; }

    /* spinner */
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <h1>Doc<span>Chat</span></h1>
  <div class="model-bar">
    <label for="model-select">Model</label>
    <select id="model-select" title="Active LLM model"></select>
    <button class="btn btn-ghost" id="reload-models-btn" title="Refresh model list">↻</button>
  </div>
</header>

<!-- ── MAIN ── -->
<div class="main">

  <!-- SIDEBAR -->
  <aside>
    <div class="sidebar-section">
      <h2>Upload Documents</h2>
      <div id="drop-zone">
        <p>Drag &amp; drop files here<br>or <strong id="browse-link">browse</strong></p>
        <input type="file" id="file-input" multiple accept=".pdf,.doc,.docx,.txt,.png,.jpg,.jpeg" />
      </div>
      <div class="upload-progress" id="upload-progress">
        <div class="spinner"></div>
        <span id="upload-status-text">Uploading…</span>
      </div>
    </div>

    <div class="file-list" id="file-list">
      <div class="empty-state" id="empty-files">No documents yet.</div>
    </div>
  </aside>

  <!-- CHAT -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome-msg">
        <div class="icon">💬</div>
        <h2>Doc ChatBot</h2>
        <p>Upload documents in the sidebar, then ask questions about their content.</p>
      </div>
    </div>
    <div class="input-bar">
      <textarea id="question-input" rows="1" placeholder="Ask a question about your documents…"></textarea>
      <button class="btn btn-primary" id="send-btn" title="Send">➤</button>
    </div>
  </div>

</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
  /* ── CONFIG ── */
  const API = '/api';

  /* ── HELPERS ── */
  function toast(msg, type = 'info', duration = 3500) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show ${type}`;
    clearTimeout(el._timer);
    el._timer = setTimeout(() => { el.className = ''; }, duration);
  }

  function fileIcon(name) {
    const ext = name.split('.').pop().toLowerCase();
    return { pdf: '📄', doc: '📝', docx: '📝', txt: '📃', png: '🖼️', jpg: '🖼️', jpeg: '🖼️' }[ext] || '📎';
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  /* ── MODELS ── */
  async function loadModels() {
    try {
      const [listRes, currentRes] = await Promise.all([
        fetch(`${API}/list_models/`),
        fetch(`${API}/current_model/`)
      ]);
      const listData    = await listRes.json();
      const currentData = await currentRes.json();
      const models  = listData['present models'] || [];
      const current = currentData['current selected model'] || '';

      const sel = document.getElementById('model-select');
      sel.innerHTML = '';
      if (models.length === 0) {
        sel.innerHTML = '<option value="">No models found</option>';
        return;
      }
      models.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m;
        opt.textContent = m;
        if (m === current) opt.selected = true;
        sel.appendChild(opt);
      });
    } catch (e) {
      toast('Could not load models. Is Ollama running?', 'error');
    }
  }

  document.getElementById('model-select').addEventListener('change', async function () {
    const model = this.value;
    try {
      const res  = await fetch(`${API}/select_model/?model_name=${encodeURIComponent(model)}`, { method: 'POST' });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed');
      toast(`Model switched to ${model}`, 'success');
    } catch (e) {
      toast('Failed to switch model: ' + e.message, 'error');
    }
  });

  document.getElementById('reload-models-btn').addEventListener('click', () => {
    loadModels();
    toast('Models refreshed', 'info');
  });

  /* ── FILE LIST ── */
  async function loadFiles() {
    try {
      const res  = await fetch(`${API}/list_files/`);
      const data = await res.json();
      renderFileList(data);
    } catch (e) {
      toast('Could not load file list.', 'error');
    }
  }

  function renderFileList(data) {
    const container = document.getElementById('file-list');
    const groups = [
      { key: 'pdf_files',  label: 'PDFs'   },
      { key: 'word_files', label: 'Word'   },
      { key: 'text_files', label: 'Text'   },
      { key: 'image_files',label: 'Images' },
    ];

    let html = '';
    let total = 0;
    groups.forEach(({ key, label }) => {
      const files = data[key] || [];
      if (files.length === 0) return;
      total += files.length;
      html += `<div class="file-group-label">${label}</div>`;
      files.forEach(f => {
        html += `
          <div class="file-item" data-name="${f}">
            <span class="file-icon">${fileIcon(f)}</span>
            <span class="file-name" title="${f}">${f}</span>
            <button class="btn btn-danger delete-btn" data-name="${f}" title="Delete">✕</button>
          </div>`;
      });
    });

    if (total === 0) {
      container.innerHTML = '<div class="empty-state" id="empty-files">No documents yet.</div>';
    } else {
      container.innerHTML = html;
      container.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', () => deleteFile(btn.dataset.name));
      });
    }
  }

  async function deleteFile(filename) {
    if (!confirm(`Delete "${filename}"? The vector DB will be rebuilt.`)) return;
    try {
      const res = await fetch(`${API}/delete_file/?filename=${encodeURIComponent(filename)}`, { method: 'DELETE' });
      if (!res.ok) {
        const d = await res.json();
        throw new Error(d.error || 'Delete failed');
      }
      toast(`Deleted ${filename}`, 'success');
      loadFiles();
    } catch (e) {
      toast('Delete failed: ' + e.message, 'error');
    }
  }

  /* ── UPLOAD ── */
  const dropZone  = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');

  document.getElementById('browse-link').addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('click', (e) => { if (e.target.id !== 'browse-link') fileInput.click(); });

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    uploadFiles(e.dataTransfer.files);
  });
  fileInput.addEventListener('change', () => { uploadFiles(fileInput.files); fileInput.value = ''; });

  async function uploadFiles(fileList) {
    if (!fileList || fileList.length === 0) return;

    const progress = document.getElementById('upload-progress');
    const statusText = document.getElementById('upload-status-text');
    progress.classList.add('visible');
    statusText.textContent = `Uploading ${fileList.length} file(s)…`;

    const formData = new FormData();
    const rename = {};
    Array.from(fileList).forEach(f => {
      formData.append('file', f);
      const base = f.name.replace(/\.[^.]+$/, '');
      rename[base] = base;
    });
    formData.append('rename', JSON.stringify(rename));

    try {
      const res  = await fetch(`${API}/upload_file/`, { method: 'POST', body: formData });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Upload failed');

      const saved  = data.saved_files  || [];
      const errors = data.error_files  || [];

      if (saved.length > 0)  toast(`Uploaded: ${saved.join(', ')}`, 'success', 5000);
      if (errors.length > 0) toast(`Errors: ${errors.length} file(s) skipped`, 'error', 6000);

      loadFiles();
    } catch (e) {
      toast('Upload failed: ' + e.message, 'error');
    } finally {
      progress.classList.remove('visible');
    }
  }

  /* ── CHAT ── */
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('question-input');
  const sendBtn    = document.getElementById('send-btn');
  let   isSending  = false;

  function appendMessage(role, text, isError = false) {
    const welcome = document.getElementById('welcome-msg');
    if (welcome) welcome.remove();

    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${role}${isError ? ' error' : ''}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'U' : '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    msgDiv.appendChild(avatar);
    msgDiv.appendChild(bubble);
    messagesEl.appendChild(msgDiv);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return msgDiv;
  }

  function showTyping() {
    const welcome = document.getElementById('welcome-msg');
    if (welcome) welcome.remove();

    const msgDiv = document.createElement('div');
    msgDiv.className = 'message bot';
    msgDiv.id = 'typing-indicator';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble typing-indicator';
    bubble.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

    msgDiv.appendChild(avatar);
    msgDiv.appendChild(bubble);
    messagesEl.appendChild(msgDiv);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    const question = inputEl.value.trim();
    if (!question || isSending) return;

    isSending = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    autoResize(inputEl);

    appendMessage('user', question);
    showTyping();

    try {
      const res  = await fetch(`${API}/get_response/`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question })
      });
      const data = await res.json();
      removeTyping();
      if (!res.ok) {
        appendMessage('bot', data.error || 'Something went wrong.', true);
      } else {
        appendMessage('bot', data.response || data.answer || '(no response)');
      }
    } catch (e) {
      removeTyping();
      appendMessage('bot', 'Network error: ' + e.message, true);
    } finally {
      isSending = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  sendBtn.addEventListener('click', sendMessage);

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  inputEl.addEventListener('input', () => autoResize(inputEl));

  /* ── INIT ── */
  loadModels();
  loadFiles();
</script>
</body>
</html>
